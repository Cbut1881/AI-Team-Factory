<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="gear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.3"/>
  <!-- Gear shape (factory) -->
  <path d="M32 12 L35 18 L42 16 L40 23 L47 25 L43 30 L48 35 L42 35 L44 42 L37 39 L35 46 L32 40 L29 46 L27 39 L20 42 L22 35 L16 35 L21 30 L17 25 L24 23 L22 16 L29 18 Z" fill="url(#gear)" stroke="url(#glow)" stroke-width="0.8"/>
  <!-- Robot head (AI) -->
  <rect x="24" y="24" width="16" height="14" rx="4" fill="url(#bg)" stroke="url(#glow)" stroke-width="1.8"/>
  <!-- Eyes -->
  <circle cx="28.5" cy="30" r="2.2" fill="#00f0ff"/>
  <circle cx="35.5" cy="30" r="2.2" fill="#7b2ff7"/>
  <!-- Mouth -->
  <rect x="27" y="34" width="10" height="1.5" rx="0.75" fill="url(#glow)" opacity="0.7"/>
  <!-- Antenna -->
  <line x1="32" y1="24" x2="32" y2="19" stroke="url(#glow)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="32" cy="18" r="2" fill="#00f0ff"/>
  <!-- Bottom connectors -->
  <rect x="26" y="38" width="3" height="5" rx="1" fill="url(#glow)" opacity="0.5"/>
  <rect x="31" y="38" width="3" height="5" rx="1" fill="url(#glow)" opacity="0.5"/>
  <rect x="35" y="38" width="3" height="5" rx="1" fill="url(#glow)" opacity="0.5"/>
  <!-- Corner accents -->
  <path d="M4 14 L4 4 L14 4" fill="none" stroke="#00f0ff" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  <path d="M50 4 L60 4 L60 14" fill="none" stroke="#7b2ff7" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  <path d="M4 50 L4 60 L14 60" fill="none" stroke="#7b2ff7" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  <path d="M50 60 L60 60 L60 50" fill="none" stroke="#00f0ff" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
</svg>
